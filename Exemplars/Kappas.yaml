# reset context
Inference:
  SqrtFast:
    Approximates: "Sqrt<fx, fr, ρ>(x) -> r"
    Kappas:
      - { interval: '[ -Inf, Inf ]', kappa: 1 }
    Requires:
      - ('fx == fr')
      - ('fx in [Binary8p3se, Binary8p4se]')
    Projections:
      [ [NearestTiesToEven, TowardZero], [NearestTiesToEven, SatFinite]  ]
    Verification:
      note: "Exhaustive testing performed for all supported formats."
      function:
        uri: https://implementer.site/P3109/Kappas/SqrtFast.c
# reset context
Training:
  ExpFast:
    - Approximates: "Exp<fx, fr, ρ>(x) -> r"
    - Verification:
        method: statistical sampling
        note: 10 million random samples per range.
        function:
          uri: https://implementer.site/P3109/Kappas/ExpFast.jl
  # first approximation configuration
  ExpFast.1:
    - Requires:
        - (' fx == fr ')
        - (' fx in [ Binary8p3se ] ')
    - Projections:
        RoundingMode:
          - ToOdd
          - StochasticB:
            - bits: (4)
        SaturationMode:
          - SatPropagate
    - Kappas:
        - {interval: '[ -Inf, 0 )', kappa: 1}
        - {interval: '[ 0, 1 ]', kappa: 0}
        - {interval: '( 1, Inf ]', kappa: 1}
  # second approximation configuration
  ExpFast.2:
    - Requires:
        - (' fx in [ Binary8p3se ] ')
        - (' fr in [ Binary8p4se ] ')
    - Projections:
        RoundingMode: [ NearestTiesToEven, ToOdd ]
        SaturationMode: [ SatPropagate ]
    - Kappas:
      - {interval: '[ -Inf, -1 )', kappa: 1}
      - {interval: '[ -1, 1 ]', kappa: 0}
      - {interval: '( 1, Inf ]', kappa: 1}
