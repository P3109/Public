# reset context
Inference:
  - "Add<fx, fy, fr, ρ>(x, y) -> r":
      Requires:
        - (' fx == fy ')
        - (' BitwidthOf(fr) >= BitwidthOf(fx) ')
        - (' PrecisionOf(fr) >= PrecisionOf(fx) ')
      Projections:
        - { RoundingMode: NearestTiesToEven, SaturationMode: OvfInf }
        - { RoundingMode: NearestTiesToEven, SaturationMode: SatPropagate }
  - "Sqrt<fx, fr, ρ>(x) -> r":
      Requires:
        - (' fx == fr ')
      Projections:
        RoundingMode: [NearestTiesToEven, ToZero]
        SaturationMode: [OvfInf, SatPropagate]
  - "Other<fx, fr, ρ>(x) -> r":       # matches all StandardOperations `Function<fx, fr, ρ}` not given above
      Requires:
        - (' fx == fr ')
  - "Other<fx, fy, fr, ρ>(x, y) -> r":   # matches all StandardOperations `Function<fx, fy, fr, ρ}` not given above
      Requires:
        - [(' fx == fx '), (' fy == fr ')]
      Projections:
        - { RoundingMode: NearestTiesToEven, SaturationMode: OvfInf }
# reset contex
Training:
  - "Add<fx, fy, fr, ρ>:(x, y) -> r":
      Requires:
        - (' fx == fy ')
        - (' fx in [Binary4p2se, Binary8p4se] ')
        - (' fr in [Binary8p4se] ')
      Projections:
          - { RoundingMode: NearestTiesToEven, SaturationMode: OvfInf }
          - { RoundingMode: NearestTiesToEven, SaturationMode: SatFinite }
  - "FMA<fx, fy, fz, fr, ρ>(x, y, z) -> r":
      Requires:
        - [ (' fx == fy '), (' fz == fr ') ]
        - [ (' BitwidthOf(fr) >= BitwidthOf(fx) '), (' PrecisionOf(fr) >= PrecisionOf(fx) ') ]
      Projections:
        - { RoundingMode: NearestTiesToEven, SaturationMode: SatPropagate }
  - "Other<fx, fr, ρ>(x) -> r":  # matches all StandardOperations `Fn<fx, fr, ρ>` not given above
      Requires:
        - (' fx == fr ')
      Projections:
        - { RoundingMode: NearestTiesToEven, SaturationMode: SatOvf }
